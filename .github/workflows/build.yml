#!/bin/bash

# 1. Создание структуры папок
mkdir -p app/src/main/java/com/example/volumeoverlay
mkdir -p app/src/main/res/values
mkdir -p .github/workflows

# 2. Создание файлов сборки Gradle
cat << 'EOF' > build.gradle
buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.1.4'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.8.22"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}
EOF

cat << 'EOF' > settings.gradle
include ':app'
EOF

cat << 'EOF' > app/build.gradle
plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.example.volumeoverlay'
    compileSdk 34

    defaultConfig {
        applicationId "com.example.volumeoverlay"
        minSdk 29 // Android 10
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
}
EOF

# 3. Создание манифеста AndroidManifest.xml
cat << 'EOF' > app/src/main/AndroidManifest.xml
<manifest xmlns:android="http://android.com"
    package="com.example.volumeoverlay">

    <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW"/>

    <application
        android:allowBackup="true"
        android:label="Volume Overlay"
        android:theme="@style/Theme.AppCompat.NoActionBar">
        
        <activity android:name=".MainActivity"
            android:exported="true">
            <intent-filter>
                <action android:name="android.intent.action.MAIN" />
                <category android:name="android.intent.category.LAUNCHER" />
            </intent-filter>
        </activity>

        <service
            android:name=".OverlayService"
            android:enabled="true"
            android:exported="false" />
    </application>
</manifest>
EOF

# 4. Создание стилей
cat << 'EOF' > app/src/main/res/values/themes.xml
<resources>
    <style name="Theme.AppCompat.NoActionBar" parent="Theme.AppCompat.Light.NoActionBar" />
</resources>
EOF

# 5. Исходный код MainActivity.kt
cat << 'EOF' > app/src/main/java/com/example/volumeoverlay/MainActivity.kt
package com.example.volumeoverlay

import android.content.Intent
import android.net.Uri
import android.os.Bundle
import android.provider.Settings
import androidx.appcompat.app.AppCompatActivity

class MainActivity : AppCompatActivity() {
    override fun onCreate(savedInstanceState: Bundle?) {
        super.onCreate(savedInstanceState)

        if (!Settings.canDrawOverlays(this)) {
            val intent = Intent(
                Settings.ACTION_MANAGE_OVERLAY_PERMISSION,
                Uri.parse("package:$packageName")
            )
            startActivityForResult(intent, 123)
        } else {
            startService(Intent(this, OverlayService::class.java))
            finish()
        }
    }

    override fun onActivityResult(requestCode: Int, resultCode: Int, data: Intent?) {
        super.onActivityResult(requestCode, resultCode, data)
        if (requestCode == 123 && Settings.canDrawOverlays(this)) {
            startService(Intent(this, OverlayService::class.java))
        }
        finish()
    }
}
EOF

# 6. Исходный код OverlayService.kt
cat << 'EOF' > app/src/main/java/com/example/volumeoverlay/OverlayService.kt
package com.example.volumeoverlay

import android.app.Service
import android.content.Context
import android.content.Intent
import android.graphics.Color
import android.graphics.PixelFormat
import android.media.AudioManager
import android.os.IBinder
import android.view.Gravity
import android.view.MotionEvent
import android.view.View
import android.view.WindowManager
import android.widget.Button
import android.widget.LinearLayout

class OverlayService : Service() {

    private lateinit var windowManager: WindowManager
    private lateinit var layoutView: LinearLayout
    private lateinit var audioManager: AudioManager

    // --- НАСТРОЙКИ ВНЕШНЕГО ВИДА КНОПОК ---
    private val buttonSize = 160 // Размер кнопок в пикселях (ширина и высота)
    private val buttonColor = Color.parseColor("#CC222222") // Цвет фона (темно-серый полупрозрачный)
    private val textColor = Color.WHITE // Цвет текста (+ и -)

    override fun onBind(intent: Intent?): IBinder? = null

    override fun onCreate() {
        super.onCreate()
        windowManager = getSystemService(WINDOW_SERVICE) as WindowManager
        audioManager = getSystemService(Context.AUDIO_SERVICE) as AudioManager

        layoutView = LinearLayout(this).apply {
            orientation = LinearLayout.VERTICAL
        }

        // Кнопка увеличения громкости
        val btnUp = Button(this).apply {
            text = "+"
            textSize = 24f
            setTextColor(textColor)
            setBackgroundColor(buttonColor)
            layoutParams = LinearLayout.LayoutParams(buttonSize, buttonSize).apply {
                setMargins(0, 0, 0, 10)
            }
            setOnClickListener {
                audioManager.adjustStreamVolume(AudioManager.STREAM_MUSIC, AudioManager.ADJUST_RAISE, AudioManager.FLAG_SHOW_UI)
            }
        }

        // Кнопка уменьшения громкости
        val btnDown = Button(this).apply {
            text = "-"
            textSize = 24f
            setTextColor(textColor)
            setBackgroundColor(buttonColor)
            layoutParams = LinearLayout.LayoutParams(buttonSize, buttonSize)
            setOnClickListener {
                audioManager.adjustStreamVolume(AudioManager.STREAM_MUSIC, AudioManager.ADJUST_LOWER, AudioManager.FLAG_SHOW_UI)
            }
        }

        layoutView.addView(btnUp)
        layoutView.addView(btnDown)

        // Конфигурация системного слоя (Overlay) поверх всех приложений для Android 10
        val params = WindowManager.LayoutParams(
            WindowManager.LayoutParams.WRAP_CONTENT,
            WindowManager.LayoutParams.WRAP_CONTENT,
            WindowManager.LayoutParams.TYPE_APPLICATION_OVERLAY,
            WindowManager.LayoutParams.FLAG_NOT_FOCUSABLE,
            PixelFormat.TRANSLUCENT
        ).apply {
            gravity = Gravity.CENTER_VERTICAL or Gravity.END // Начальная позиция справа по центру
            x = 20
            y = 0
        }

        // Обработка перетаскивания пальцем всего контейнера с кнопками
        layoutView.setOnTouchListener(object : View.OnTouchListener {
            private var initialX = 0
            private var initialY = 0
            private var initialTouchX = 0f
            private var initialTouchY = 0f

            override fun onTouch(v: View?, event: MotionEvent): Boolean {
                when (event.action) {
                    MotionEvent.ACTION_DOWN -> {
                        initialX = params.x
                        initialY = params.y
                        initialTouchX = event.rawX
                        initialTouchY = event.rawY
                        return true
                    }
                    MotionEvent.ACTION_MOVE -> {
                        // Рассчитываем смещение (инвертируем X, так как гравитация привязана к правого краю SCREEN_END)
                        params.x = initialX - (event.rawX - initialTouchX).toInt()
                        params.y = initialY + (event.rawY - initialTouchY).toInt()
                        windowManager.updateViewLayout(layoutView, params)
                        return true
                    }
                }
                return false
            }
        })

        windowManager.addView(layoutView, params)
    }

    override fun onDestroy() {
        super.onDestroy()
        if (::layoutView.isInitialized) windowManager.removeView(layoutView)
    }
}
EOF

# 7. Создание рабочего процесса сборки для GitHub Actions
cat << 'EOF' > .github/workflows/android.yml
name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Create Gradle Wrapper
      run: npm install -g gradle && gradle wrapper

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: volume-overlay-apk
        path: app/build/outputs/apk/debug/app-debug.apk
EOF

# 8. Создание файла-заглушки для локальной сборки (Gradle Wrapper конфигурация)
mkdir -p gradle/wrapper
cat << 'EOF' > gradle/wrapper/gradle-wrapper.properties
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
EOF

echo "Проект успешно сгенерирован!"
