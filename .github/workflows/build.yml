echo [1/5] Создание структуры проекта...
mkdir app\src\main\java\com\example\volumewidget
mkdir app\src\main\res\layout
mkdir app\src\main\res\values
mkdir gradle\wrapper

echo [2/5] Создание файлов конфигурации Gradle...
(
echo pluginManagement { repositories { google^(^); mavenCentral^(^); gradlePluginPortal^(^); } }
echo dependencyResolutionManagement { repositoriesMode.set^(RepositoriesMode.FAIL_ON_PROJECT_REPOS^); repositories { google^(^); mavenCentral^(^); } }
echo rootProject.name = "VolumeWidget"
echo include ':app'
) > settings.gradle

(
echo plugins { id 'com.android.application' version '8.2.0' }
echo android {
echo     namespace 'com.example.volumewidget'
echo     compileSdk 34
echo     defaultConfig {
echo         applicationId "com.example.volumewidget"
echo         minSdk 29
echo         targetSdk 34
echo         versionCode 1
echo         versionName "1.0"
echo     }
echo     buildTypes { release { minifyEnabled false } }
echo }
echo dependencies {
echo     implementation 'androidx.appcompat:appcompat:1.6.1'
echo     implementation 'com.google.android.material:material:1.11.0'
echo }
) > app\build.gradle

(
echo plugins { id 'com.android.application' version '8.2.0' apply false }
) > build.gradle

echo [3/5] Создание AndroidManifest.xml и ресурсов...
(
echo ^<?xml version="1.0" encoding="utf-8"?^>
echo ^<manifest xmlns:android="http://android.com"^>
echo     ^<uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" /^>
echo     ^<uses-permission android:name="android.permission.FOREGROUND_SERVICE" /^>
echo     ^<application android:allowBackup="true" android:label="VolumeWidget" android:theme="@style/Theme.AppCompat.Light.NoActionBar"^>
echo         ^<activity android:name=".MainActivity" android:exported="true"^>
echo             ^<intent-filter^>
echo                 ^<action android:name="android.intent.action.MAIN" /^>
echo                 ^<category android:name="android.intent.category.LAUNCHER" /^>
echo             ^</intent-filter^>
echo         ^</activity^>
echo         ^<service android:name=".VolumeService" android:enabled="true" android:exported="false" /^>
echo     ^</application^>
echo ^</manifest^>
) > app\src\main\AndroidManifest.xml

(
echo ^<?xml version="1.0" encoding="utf-8"?^>
echo ^<LinearLayout xmlns:android="http://android.com"
echo     android:layout_width="match_parent" android:layout_height="match_parent"
echo     android:orientation="vertical" android:gravity="center" android:padding="16dp"^>
echo     ^<TextView android:layout_width="wrap_content" android:layout_height="wrap_content" 
echo         android:text="Настройки виджета громкости" android:textSize="20sp" android:layout_marginBottom="20dp"/^>
echo     ^<TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Размер кнопок (dp):"/^>
echo     ^<SeekBar android:id="@+id/seek_size" android:layout_width="match_parent" android:layout_height="wrap_content" android:max="150" android:progress="60"/^>
echo     ^<TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Цвет кнопок:" android:layout_marginTop="20dp"/^>
echo     ^<RadioGroup android:id="@+id/color_group" android:layout_width="wrap_content" android:layout_height="wrap_content" android:orientation="horizontal"^>
echo         ^<RadioButton android:id="@+id/radio_red" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Красный" android:checked="true"/^>
echo         ^<RadioButton android:id="@+id/radio_blue" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Синий"/^>
echo         ^<RadioButton android:id="@+id/radio_green" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Зеленый"/^>
echo     ^</RadioGroup^>
echo     ^<Button android:id="@+id/btn_apply" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Применить и запустить" android:layout_marginTop="30dp"/^>
echo ^</LinearLayout^>
) > app\src\main\res\layout\activity_main.xml

(
echo ^<?xml version="1.0" encoding="utf-8"?^>
echo ^<LinearLayout xmlns:android="http://android.com"
echo     android:id="@+id/widget_root" android:layout_width="wrap_content" android:layout_height="wrap_content"
echo     android:orientation="horizontal" android:padding="5dp" android:background="#44000000"^>
echo     ^<Button android:id="@+id/btn_volume_down" android:layout_width="60dp" android:layout_height="60dp" android:text="-" android:textSize="24sp" /^>
echo     ^<Button android:id="@+id/btn_volume_up" android:layout_width="60dp" android:layout_height="60dp" android:text="+" android:textSize="24sp" android:layout_marginLeft="5dp"/^>
echo ^</LinearLayout^>
) > app\src\main\res\layout\widget_layout.xml

(
echo ^<resources^>^<string name="app_name"^>VolumeWidget^</string^>^</resources^>
) > app\src\main\res\values\strings.xml

echo [4/5] Запись исходного Java-кода...
(
echo package com.example.volumewidget;
echo import android.content.Intent;
echo import android.content.SharedPreferences;
echo import android.graphics.Color;
echo import android.net.Uri;
echo import android.os.Build;
echo import android.os.Bundle;
echo import android.provider.Settings;
echo import android.widget.Button;
echo import android.widget.RadioGroup;
echo import android.widget.SeekBar;
echo import android.widget.Toast;
echo import androidx.appcompat.app.AppCompatActivity;
echo public class MainActivity extends AppCompatActivity {
echo     private static final int REQ_CODE = 5469;
echo     private SeekBar seekSize;
echo     private RadioGroup colorGroup;
echo     @Override
echo     protected void onCreate(Bundle savedInstanceState) {
echo         super.onCreate(savedInstanceState);
echo         setContentView(R.layout.activity_main);
echo         seekSize = findViewById(R.id.seek_size);
echo         colorGroup = findViewById(R.id.color_group);
echo         Button btnApply = findViewById(R.id.btn_apply);
echo         btnApply.setOnClickListener(v -^> {
echo             saveSettings();
echo             checkOverlayPermission();
echo         });
echo     }
echo     private void saveSettings() {
echo         SharedPreferences prefs = getSharedPreferences("WidgetPrefs", MODE_PRIVATE);
echo         SharedPreferences.Editor editor = prefs.edit();
echo         int size = seekSize.getProgress();
echo         if(size ^< 30) size = 30;
echo         editor.putInt("btn_size", size);
echo         int color = Color.RED;
echo         int checkedId = colorGroup.getCheckedRadioButtonId();
echo         if (checkedId == R.id.radio_blue) color = Color.BLUE;
echo         else if (checkedId == R.id.radio_green) color = Color.GREEN;
echo         editor.putInt("btn_color", color);
echo         editor.apply();
echo     }
echo     private void checkOverlayPermission() {
echo         if (Build.VERSION.SDK_INT ^>= Build.VERSION_CODES.M ^&^!^!Settings.canDrawOverlays(this)) {
echo             Intent intent = new Intent(Settings.ACTION_MANAGE_OVERLAY_PERMISSION, Uri.parse("package:" + getPackageName()));
echo             startActivityForResult(intent, REQ_CODE);
echo         } else {
echo             startVolumeService();
echo         }
echo     }
echo     private void startVolumeService() {
echo         Intent intent = new Intent(this, VolumeService.class);
echo         if (Build.VERSION.SDK_INT ^>= Build.VERSION_CODES.O) startForegroundService(intent);
echo         else startService(intent);
echo         finish();
echo     }
echo     @Override
echo     protected void onActivityResult(int requestCode, int resultCode, Intent data) {
echo         super.onActivityResult(requestCode, resultCode, data);
echo         if (requestCode == REQ_CODE) {
echo             if (Build.VERSION.SDK_INT ^>= Build.VERSION_CODES.M ^&^& Settings.canDrawOverlays(this)) startVolumeService();
echo             else Toast.makeText(this, "Разрешение отклонено!", Toast.LENGTH_SHORT).show();
echo         }
echo     }
echo }
) > app\src\main\java\com\example\volumewidget\MainActivity.java

