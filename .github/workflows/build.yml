echo [5/5] Скачивание Gradle и компиляция APK...
:: Скачиваем и используем официальную утилиту сборки Gradle
powershell -Command "Invoke-WebRequest https://githubusercontent.com -OutFile gradlew"
powershell -Command "Invoke-WebRequest https://githubusercontent.com.bat -OutFile gradlew.bat"
mkdir gradle\wrapper
(
echo distributionBase=GRADLE_USER_HOME
echo distributionPath=wrapper/dists
echo distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
echo zipStoreBase=GRADLE_USER_HOME
echo zipStorePath=wrapper/dists
) > gradle\wrapper\gradle-wrapper.properties

:: Запуск сборки релизного APK
call gradlew.bat assembleDebug

echo Сборка завершена! Готовый файл ищите здесь: app\build\outputs\apk\debug\app-debug.apk
pause
